<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">
    <h2 class="text-xl font-bold mb-4 text-center">Register</h2>

    <form id="registerForm" class="space-y-3">
        <input type="text" id="fullName" placeholder="Full Name"
            class="w-full border p-2 rounded" required>

        <input type="email" id="email" placeholder="Email"
            class="w-full border p-2 rounded" required>

        <input type="text" id="phone" placeholder="Phone"
            class="w-full border p-2 rounded" required>

        <button type="submit"

            class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700 transition duration-200">
            Submit
        </button>
    </form>

    <a href="detail.html" class="block text-center text-blue-600 mt-3 ">
        View Details
    </a>

<script>
    function getCookie(name) {
        let cookies = document.cookie.split(";");
        for(let c of cookies){
            let [key, value] = c.trim().split("=");
            if(key === name) return value;
        }
        return null;
    }

if(!getCookie("username")){
    window.location.href = "login.html";
}

document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    const fullName = document.getElementById("fullName").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;

    let newUser = {
        fullName: fullName,
        email: email,
        phone: phone
    };

    let users = JSON.parse(localStorage.getItem("users")) || [];
    users.push(newUser);

    localStorage.setItem("users", JSON.stringify(users));

    alert("User saved!");
});
    </script>
</div>
