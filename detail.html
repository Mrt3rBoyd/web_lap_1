<!DOCTYPE html>
<html>
<head>
    <title>Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<h2 class="text-2xl font-bold mb-6">User Details</h2>

<table class="table-auto border-collapse border border-gray-400 w-full bg-white shadow rounded-lg overflow-hidden">
    <thead>
        <tr class="bg-gray-200">
            <th class="border p-2">Full Name</th>
            <th class="border p-2">Email</th>
            <th class="border p-2">Phone</th>
            <th class="border p-2">Action</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
//chcekCookie
function getCookie(name) {
    let cookies = document.cookie.split(";");
    for(let c of cookies){
        let [key, value] = c.trim().split("=");
        if(key === name) return value;
    }
    return null;
}

if(!getCookie("username")){
    window.location.href = "login.html";
}

//Load Users
let users = JSON.parse(localStorage.getItem("users")) || [];
let tableBody = document.getElementById("tableBody");

function displayUsers(){
    tableBody.innerHTML = "";

    users.forEach((user, index) => {
        let row = `
        <tr class="text-center hover:bg-gray-100">
            <td class="border p-2">${user.fullName}</td>
            <td class="border p-2">${user.email}</td>
            <td class="border p-2">${user.phone}</td>
            <td class="border p-2">
                <button onclick="removeUser(${index})"
                    class="bg-red-600 text-white px-3 py-1 rounded 
                           hover:bg-red-700 transition duration-200">
                    Remove
                </button>
            </td>
        </tr>
        `;
        tableBody.innerHTML += row;
    });
}

//Remove User
function removeUser(index){
    users.splice(index, 1); 
    localStorage.setItem("users", JSON.stringify(users)); // update storage
    displayUsers(); 
}


displayUsers();
</script>

</body>
</html>
